<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Create</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lik-theme') || 'dark');
    </script>
    <link rel="stylesheet" href="css/styles.css?v=1.0.0">
</head>
<body>
    <div class="app-container">
        <header>
            <div onclick="window.location.href='index.html'" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <img src="logo.png" alt="LIK Logo" style="width: 32px; height: 32px; border-radius: 6px; object-fit: cover;">
                <h1 style="margin: 0; line-height: 1;">LIK</h1>
            </div>
            <nav class="desktop-nav">
                <a href="index.html">Wall</a>
                <a href="upload.html" class="active">Upload</a>
                <a href="swaps.html">Swaps</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>
        
        <main>
            <div style="max-width: 600px; margin: 0 auto;">
                <div class="upload-preview-frame" id="frame-preview-box" style="display: none;">
                    <img src="" id="img-render-target" alt="Staged Preview">
                </div>

                <div class="post-card" style="padding: 24px;">
                    <form id="upload-form">
                        <div class="form-group">
                            <label for="moment-text">Caption Content</label>
                            <textarea id="moment-text" rows="3" placeholder="Write a caption or text moment..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="moment-file" style="background: var(--hover-bg); border: 1px dashed var(--card-border); padding: 24px; text-align:center; border-radius:8px; cursor:pointer; display:block; font-weight: 500; color: var(--text-main);">
                                Select Photo Source
                            </label>
                            <input type="file" id="moment-file" accept="image/*" style="display: none;">
                        </div>
                        <button type="submit" class="btn-primary" style="margin-top: 12px; width: 100%;">Share Moment</button>
                    </form>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html">Wall</a>
            <a href="upload.html" class="active">Upload</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html">Profile</a>
        </nav>
    </div>
    
    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/upload.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Create</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 onclick="window.location.href='index.html'">LIK</h1>
            <nav class="desktop-nav">
                <a href="index.html">Wall</a>
                <a href="upload.html" class="active">Upload</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>
        <main>
            <div class="upload-preview-frame" id="frame-preview-box">
                <img src="" id="img-render-target" alt="Staged Preview">
            </div>

            <form id="upload-form">
                <div class="form-group">
                    <label for="moment-text">Caption Content</label>
                    <textarea id="moment-text" placeholder="Write a caption or text moment..."></textarea>
                </div>
                <div class="form-group">
                    <label for="moment-file" style="background: rgba(255,255,255,0.02); border: 1px dashed var(--card-border); padding: 24px; text-align:center; border-radius:8px; cursor:pointer; display:block;">
                        Select Photo Source
                    </label>
                    <input type="file" id="moment-file" accept="image/*" style="display: none;">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 12px;">Share Moment</button>
            </form>
            <p style="font-size:0.75rem; color:var(--text-muted); text-align:center; margin-top:16px;">This post automatically disappears in 24 hours.</p>
        </main>

        <nav class="bottom-nav">
            <a href="index.html">Wall</a>
            <a href="upload.html" class="active">Upload</a>
            <a href="profile.html">Profile</a>
        </nav>
    </div>
    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/upload.js"></script>
</body>
</html>

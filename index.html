<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Wall</title>
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lik-theme') || 'dark');
    </script>
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 onclick="window.location.href='index.html'">LIK</h1>
            <nav class="desktop-nav" id="app-nav-desktop" style="display: none;">
                <a href="index.html" class="active">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="swaps.html">Swaps</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>

        <main>
            <div id="auth-gateway-view" style="display: none;">
                <div style="text-align: center; padding: 40px 20px; max-width: 400px; margin: 0 auto;">
                    <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem;">A temporary space for real-time moments.</p>
                    <button id="google-login-btn" class="btn-primary" style="width: 100%;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16" alt="Google">
                        Continue with Google
                    </button>
                </div>
            </div>

            <div id="app-feed-view" style="display: none;">
                <div id="wall-feed-container">
                    
                    <!-- Updated search placeholder constraint -->
                    <div class="search-wrapper" style="margin-bottom: 24px;">
                        <div class="form-group" style="margin-bottom: 0; position: relative;">
                            <input type="text" id="user-search-input" placeholder="search people" style="padding-left: 14px;">
                        </div>
                        <div id="search-results-tray" class="post-card" style="display: none; position: absolute; width: 100%; z-index: 2000; padding: 6px; margin-top: 6px;"></div>
                    </div>
                    
                    <div id="wall-feed">
                        <p style="text-align:center; color:var(--text-muted); padding: 40px 0; font-size:0.9rem;">Syncing feed streams...</p>
                    </div>
                    
                </div>
            </div>
        </main>

        <nav class="bottom-nav" id="app-nav" style="display: none;">
            <a href="index.html" class="active">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html">Profile</a>
        </nav>
    </div>

    <div id="onboarding-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0; font-weight:700; margin-bottom: 16px;">Complete Profile</h3>
            <form id="onboarding-form">
                <div class="form-group">
                    <label for="user-name">Display Name</label>
                    <input type="text" id="user-name" required placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" required min="13" placeholder="Your age">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 8px; width: 100%;">Create Profile</button>
            </form>
        </div>
    </div>

    <div id="view-user-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 420px; text-align: center; padding: 28px;">
            <div class="profile-avatar" id="view-user-avatar" style="width: 90px; height: 90px; font-size: 2rem; margin: 0 auto 16px auto;">--</div>
            <h2 id="view-user-name" style="font-size: 1.35rem; font-weight: 700; margin-bottom: 2px;">User</h2>
            <p id="view-user-handle" style="color: var(--accent-color); font-weight: 600; font-size: 0.95rem; margin-bottom: 14px;">/handle</p>
            <div id="view-user-bio" class="profile-bio-text">No biography set.</div>
            
            <div style="display: flex; gap: 12px;">
                <button type="button" id="close-user-modal-btn" class="btn-secondary" style="flex: 1;">Close</button>
                <button type="button" id="swap-action-btn" class="btn-primary" style="flex: 1;">Swap</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/wall.js"></script>
</body>
</html>

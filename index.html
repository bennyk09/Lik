<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK</title>
    <link rel="stylesheet" href="/Lik/css/style.css?v=11.0.2">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 onclick="window.location.href='index.html'">LIK</h1>
            <nav class="desktop-nav" id="app-nav-desktop" style="display: none;">
                <a href="index.html" class="active">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="profile.html">Profile</a>
                <a href="#" id="logout-btn-desktop">Logout</a>
            </nav>
        </header>

        <main>
            <div id="auth-gateway-view" style="display: none;">
                <div style="text-align: center; padding: 40px 20px; max-width: 400px; margin: 0 auto;">
                    <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 0.95rem;">A temporary space for real-time moments.</p>
                    <button id="google-login-btn" class="btn-primary btn-google" style="width: 100%;">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16" alt="Google">
                        Continue with Google
                    </button>
                </div>
            </div>

            <div id="app-feed-view" style="display: none;">
                <div id="wall-feed-container" style="max-width: 600px; margin: 0 auto; position: relative;">
                    
                    <div class="search-wrapper" style="margin-bottom: 24px; position: relative;">
                        <div class="form-group" style="margin-bottom: 0; position: relative;">
                            <input type="text" id="user-search-input" placeholder="Search profiles by handle... (e.g. benny)" style="padding-left: 38px; height: 42px; background: var(--card-color); border: 1px solid var(--card-border); border-radius: var(--radius-md); color: var(--text-main); width: 100%; font-size: 0.9rem;">
                            <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.6; font-size: 0.85rem;">🔍</span>
                        </div>
                        <div id="search-results-tray" class="post-card" style="display: none; margin-top: 6px; padding: 6px; margin-bottom: 0; position: absolute; width: 100%; z-index: 2000; border-color: var(--card-border); background: #16161a; box-shadow: 0 12px 32px rgba(0,0,0,0.5);"></div>
                    </div>
                    
                    <div id="wall-feed">
                        <p style="text-align:center; color:var(--text-muted); padding: 40px 0; font-size:0.9rem;">Syncing feed streams...</p>
                    </div>
                    
                </div>
            </div>
        </main>

        <nav class="bottom-nav" id="app-nav" style="display: none;">
            <a href="index.html" class="active">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="logout-btn-mobile">Logout</a>
        </nav>
    </div>

    <div id="onboarding-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0; font-weight:700; margin-bottom: 16px;">Complete Profile</h3>
            <form id="onboarding-form">
                <div class="form-group">
                    <label for="user-name">Display Name</label>
                    <input type="text" id="user-name" required placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" required min="13" placeholder="Your age">
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 8px; width: 100%;">Create Profile</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/wall.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIK - Wall</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>LIK</h1>
            <nav id="app-nav" style="display: none;">
                <a href="index.html" class="active">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="profile.html">Profile</a>
                <a href="about.html">About</a>
                <a href="#" id="logout-btn">Logout</a>
            </nav>
        </header>

        <main>
            <div id="auth-gateway-view" style="display: none;">
                <p style="color: var(--text-muted); margin-bottom: 24px;">A temporary open-source space for real-time moments.</p>
                <button id="google-login-btn" class="btn-primary btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                    Continue with Google
                </button>
            </div>

            <div id="app-feed-view" style="display: none;">
                <div id="wall-feed">
                    <p style="text-align:center; color:var(--text-muted);">Syncing live moments...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="onboarding-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0;">Complete Your Profile</h3>
            <form id="onboarding-form">
                <div class="form-group">
                    <label for="user-name">Display Name</label>
                    <input type="text" id="user-name" required placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" required min="13">
                </div>
                <button type="submit" class="btn-primary">Enter LIK</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/wall.js"></script>
</body>
</html>

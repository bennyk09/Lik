<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Wall</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body>
    <div class="app-container">
        <!-- GLOBAL RESPONSIVE TOP BAR -->
        <header>
            <div class="brand-wrapper" onclick="window.location.href='index.html'">
                <img src="logo.png" alt="LIK Logo">
                <h1>LIK</h1>
            </div>
            <nav class="desktop-nav" id="app-nav-desktop" style="display: none;">
                <a href="index.html" class="active">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="swaps.html">Swaps</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>

        <!-- CENTERED REGULAR STREAM TIMELINE FEED -->
        <main>
            <div id="auth-gateway-view" style="display: none;">
                <div class="post-card" style="text-align: center; padding: 32px 16px;">
                    <p style="color: var(--text-muted); margin-bottom: 24px;">Sign in to share real-time moments.</p>
                    <button id="google-login-btn" class="btn-primary" style="width: 100%;">Continue with Google</button>
                </div>
            </div>

            <div id="app-feed-view" style="display: none;">
                <div class="form-group" style="margin-bottom: 16px; position: relative;">
                    <input type="text" id="user-search-input" placeholder="Search people...">
                    <div id="search-results-tray" class="post-card" style="display: none; position: absolute; width: 100%; z-index: 2000; padding: 8px; margin-top: 4px; background:#fff;"></div>
                </div>
                
                <div id="wall-feed">
                    <p style="text-align:center; color:var(--text-muted); padding: 40px 0;">Loading timeline posts...</p>
                </div>
            </div>
        </main>

        <!-- LOWER MOBILE BAR MARKUP LINKS -->
        <nav class="bottom-nav" id="app-nav" style="display: none;">
            <a href="index.html" class="active">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html">Profile</a>
        </nav>
    </div>

    <div id="onboarding-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px; font-weight:700;">Complete Profile</h3>
            <form id="onboarding-form">
                <div class="form-group">
                    <label for="user-name">Display Name</label>
                    <input type="text" id="user-name" required placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" required min="13">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 8px;">Create Profile</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/wall.js"></script>
</body>
</html>

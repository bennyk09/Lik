<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Home</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lik-theme') || 'light');
    </script>
    <link rel="stylesheet" href="css/style.css?v=3.0.0">
</head>
<body>
    <div class="lik-app-grid-wrapper">
        
        <header>
            <div style="width: 100%;">
                <div class="lik-brand-logo-container" onclick="window.location.href='index.html'">
                    <img src="logo.png" alt="LIK" class="lik-brand-logo-graphic">
                </div>
                <nav class="lik-desktop-sidebar-nav">
                    <a href="index.html" class="lik-active-route">Home</a>
                    <a href="upload.html">Create</a>
                    <a href="swaps.html">Swaps</a>
                </nav>
            </div>
            <button class="lik-sidebar-action-pill-btn" onclick="window.location.href='settings.html'">Set</button>
        </header>

        <main>
            <div id="auth-gateway-view" style="display: none; width: 100%; max-width: 400px; text-align: center; padding-top: 100px;">
                <p style="color: var(--lik-text-gray); margin-bottom: 24px; font-size: 0.95rem;">A temporary space for real-time moments.</p>
                <button id="google-login-btn" class="lik-sidebar-action-pill-btn" style="max-width: 100%; width: 100%; border-radius:12px;">Continue with Google</button>
            </div>

            <div id="app-feed-view" style="display: none; width: 100%; display: flex; flex-direction: column; align-items: center;">
                <div id="wall-feed-container">
                    
                    <div class="lik-feed-master-card-shell">
                        <div class="lik-search-block-wrapper">
                            <input type="text" id="user-search-input" class="lik-search-native-input" placeholder="Search people">
                            <div id="search-results-tray" style="display: none; background: white; border: 1px solid var(--lik-border-clean); border-radius: 12px; margin-top: 8px; padding: 6px; width:100%;"></div>
                        </div>

                        <div id="wall-feed">
                            <p style="text-align:center; color:var(--lik-text-gray); padding: 40px 0; font-size:0.9rem;">Syncing feed streams...</p>
                        </div>
                    </div>

                </div>

                <a href="profile.html" class="lik-sticky-right-profile-pill">
                    <div class="lik-sticky-pill-avatar-box" id="floating-pill-avatar-target">
                        <div style="width:100%; height:100%; background: #eee;"></div>
                    </div>
                    <span class="lik-sticky-pill-title">My account</span>
                </a>
            </div>
        </main>

        <nav class="lik-portable-bottom-bar" id="app-nav">
            <a href="index.html" class="lik-active-route">Home</a>
            <a href="upload.html">Create</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html">Account</a>
        </nav>
    </div>

    <div id="onboarding-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="font-weight:700; margin-bottom: 16px;">Complete Profile</h3>
            <form id="onboarding-form">
                <div class="form-group">
                    <label for="user-name">Display Name</label>
                    <input type="text" id="user-name" class="lik-search-native-input" required placeholder="Username">
                </div>
                <div class="form-group">
                    <label for="user-age">Age</label>
                    <input type="number" id="user-age" class="lik-search-native-input" required min="13" placeholder="Your age">
                </div>
                <button type="submit" style="margin-top: 12px; width: 100%; background:var(--lik-text-dark); color:#fff; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Create Profile</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/wall.js"></script>
</body>
</html>

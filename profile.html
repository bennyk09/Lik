<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIK - Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e5e5e5;
            color: #111111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: all 0.2s ease-in-out;
        }
        .profile-avatar:hover {
            opacity: 0.8;
            border-color: #111111;
        }
        .remove-pic-btn {
            background: none;
            border: none;
            color: #ff3b30;
            font-size: 0.8rem;
            margin-top: 8px;
            cursor: pointer;
            display: none;
            font-weight: 500;
        }
        .remove-pic-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>LIK</h1>
            <nav>
                <a href="index.html">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="profile.html" class="active">Profile</a>
                <a href="about.html">About</a>
                <a href="#" id="logout-btn">Logout</a>
            </nav>
        </header>
        <main>
            <div class="avatar-container">
                <div id="avatar-preview" class="profile-avatar">-</div>
                <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                <button id="remove-pic-btn" class="remove-pic-btn">Remove Photo</button>
            </div>

            <div class="card" id="profile-card">
                <p style="text-align:center; color:var(--text-muted);">Syncing profile info...</p>
            </div>
            
            <button id="open-edit-modal-btn" class="btn-primary" style="background: transparent; color: var(--text-main); border: 1px solid var(--border-color); margin-bottom: 12px; display: none;">
                Edit Profile
            </button>

            <button id="open-delete-modal-btn" class="btn-primary" style="background: transparent; color: #ff3b30; border: 1px solid #ff3b30; margin-bottom: 24px; display: none;">
                Delete Account
            </button>

            <h4 style="margin: 24px 0 12px 0; color:var(--text-muted);">Your Live Moments</h4>
            <div id="user-moments"></div>
        </main>
    </div>

    <div id="edit-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0;">Update Profile</h3>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-user-name">Display Name</label>
                    <input type="text" id="edit-user-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-user-age">Age</label>
                    <input type="number" id="edit-user-age" required min="13">
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="button" id="close-edit-modal-btn" class="btn-primary" style="background: transparent; color: var(--text-muted); border: 1px solid var(--border-color);">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="delete-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="border: 1px solid #ff3b30;">
            <h3 style="margin-top: 0; color: #ff3b30;">Delete Account Permanently?</h3>
            <p style="font-size: 0.9rem; line-height: 1.4; color: var(--text-muted);">Warning: This action cannot be undone. Your profile data, active scores, and active posts will be purged permanently.</p>
            <div style="display: flex; gap: 12px; margin-top: 20px;">
                <button type="button" id="close-delete-modal-btn" class="btn-primary" style="background: transparent; color: var(--text-main); border: 1px solid var(--border-color);">Cancel</button>
                <button type="button" id="confirm-delete-btn" class="btn-primary" style="background: #ff3b30; color: #ffffff;">Delete My Data</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Profile</title>
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lik-theme') || 'dark');
    </script>
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 onclick="window.location.href='index.html'">LIK</h1>
            <nav class="desktop-nav">
                <a href="index.html">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="swaps.html">Swaps</a>
                <a href="profile.html" class="active">Profile</a>
                <!-- Moved theme toggle up into header navigation options -->
                <a href="#" id="theme-toggle-btn" style="cursor: pointer;">☀️ Light</a>
            </nav>
        </header>
        
        <main>
            <div class="profile-meta-block">
                <div class="avatar-container">
                    <div id="avatar-preview" class="profile-avatar">-</div>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    <button id="remove-pic-btn" class="remove-pic-btn">Remove Photo</button>
                </div>
                
                <div class="profile-identity-details">
                    <h2 id="lbl-username-display" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 0;">
                        User
                    </h2>
                    <div class="stats-row" id="stats-numbers-tray"></div>
                    <div id="profile-bio-container" class="profile-bio-text">Syncing profile metadata parameters...</div>
                </div>
            </div>
            
            <!-- Restored Action Control Row Grid Framework -->
            <div style="display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; max-width: 600px; margin-left: auto; margin-right: auto;">
                <button id="open-edit-modal-btn" class="btn-secondary" style="flex: 1; display: none;">Edit Profile</button>
                <button id="logout-btn-profile" class="btn-primary" style="flex: 1;">Logout</button>
                <button id="open-delete-modal-btn" class="btn-secondary" style="color: var(--accent-red); border-color: rgba(255,59,48,0.2); flex: 1; display: none;">Delete Account</button>
            </div>

            <h4 style="margin: 24px auto 16px auto; font-size:0.8rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.5px; max-width: 600px; padding-left: 4px;">Live Timeline</h4>
            <div id="user-moments"></div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html" class="active">Profile</a>
        </nav>
    </div>

    <!-- Edit Profile Modal Layer -->
    <div id="edit-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0; font-weight:700; margin-bottom: 16px;">Update Profile</h3>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-user-name">Display Name</label>
                    <input type="text" id="edit-user-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-user-age">Age</label>
                    <input type="number" id="edit-user-age" required min="13">
                </div>
                <div class="form-group">
                    <label for="edit-user-bio">Biography</label>
                    <textarea id="edit-user-bio" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 12px; margin-top:24px;">
                    <button type="button" id="close-edit-modal-btn" class="btn-secondary" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Restored Account Deletion Warning Dialog Confirmation Container Overlay Modal -->
    <div id="delete-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="border-color: var(--accent-red);">
            <h3 style="margin-top: 0; font-weight:700; color: var(--accent-red); margin-bottom: 12px;">Delete Account</h3>
            <p style="font-size: 0.9rem; color: var(--text-main); margin-bottom: 20px; line-height: 1.4;">Warning: This action is permanent. All your moments data records, swap configurations, and timeline items will be deleted instantly.</p>
            <div style="display: flex; gap: 12px;">
                <button type="button" id="close-delete-modal-btn" class="btn-secondary" style="flex: 1;">Cancel</button>
                <button type="button" id="confirm-delete-btn" class="btn-primary" style="background: var(--accent-red); flex: 1;">Confirm Delete</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>

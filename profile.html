<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Profile</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lik-theme') || 'dark');
    </script>
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body>
    <div class="app-container">
        <header>
            <div onclick="window.location.href='index.html'" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <img src="logo.png" alt="LIK Logo" style="width: 32px; height: 32px; border-radius: 6px; object-fit: cover;">
                <h1 style="margin: 0; line-height: 1;">LIK</h1>
            </div>
            <nav class="desktop-nav">
                <a href="index.html">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="swaps.html">Swaps</a>
                <a href="profile.html" class="active">Profile</a>
            </nav>
        </header>
        
        <main>
            <div class="profile-meta-block">
                <div class="avatar-container">
                    <div id="avatar-preview" class="profile-avatar">-</div>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    <button id="remove-pic-btn" class="remove-pic-btn">Remove Photo</button>
                </div>
                
                <div class="profile-identity-details">
                    <h2 id="lbl-username-display" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 0;">
                        User
                    </h2>
                    <div class="stats-row" id="stats-numbers-tray"></div>
                    <div id="profile-bio-container" class="profile-bio-text">Syncing profile metadata parameters...</div>
                    <div id="partner-status-display-frame" style="width: 100%; margin-top: 14px;"></div>
                </div>
            </div>
            
            <div style="display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; max-width: 600px; margin-left: auto; margin-right: auto;">
                <button id="open-edit-modal-btn" class="btn-secondary" style="flex: 1; display: none;">Edit Profile</button>
                <button id="open-settings-page-btn" class="btn-primary" style="flex: 1;" onclick="window.location.href='settings.html'">Settings</button>
            </div>

            <h4 style="margin: 24px auto 16px auto; font-size:0.8rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.5px; max-width: 600px; padding-left: 4px;">Live Timeline</h4>
            <div id="user-moments"></div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html" class="active">Profile</a>
        </nav>
    </div>

    <div id="edit-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0; font-weight:700; margin-bottom: 16px;">Update Profile</h3>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-user-name">Display Name</label>
                    <input type="text" id="edit-user-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-user-age">Age</label>
                    <input type="number" id="edit-user-age" required min="13">
                </div>
                <div class="form-group">
                    <label for="edit-user-bio">Biography</label>
                    <textarea id="edit-user-bio" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 12px; margin-top:24px;">
                    <button type="button" id="close-edit-modal-btn" class="btn-secondary" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>

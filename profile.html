<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Profile</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('lik-theme') || 'light');
    </script>
    <link rel="stylesheet" href="css/style.css?v=3.0.0">
</head>
<body>
    <div class="lik-app-grid-wrapper">
        
        <header>
            <div style="width: 100%;">
                <div class="lik-brand-logo-container" onclick="window.location.href='index.html'">
                    <img src="logo.png" alt="LIK" class="lik-brand-logo-graphic">
                </div>
                <nav class="lik-desktop-sidebar-nav">
                    <a href="index.html">Home</a>
                    <a href="upload.html">Create</a>
                    <a href="swaps.html">Swaps</a>
                    <a href="profile.html" class="lik-active-route">Profile</a>
                </nav>
            </div>
            <button class="lik-sidebar-action-pill-btn" onclick="window.location.href='settings.html'">Set</button>
        </header>
        
        <main>
            <div class="lik-feed-column-container">
                
                <div class="lik-profile-card-panel">
                    <div class="lik-profile-panel-top-split">
                        <div class="lik-profile-identity-details">
                            <h2 id="lbl-username-display">User</h2>
                        </div>
                        <div style="text-align: center;">
                            <div id="avatar-preview" class="lik-profile-panel-avatar-frame">-</div>
                            <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                            <button id="remove-pic-btn" class="lik-profile-remove-photo-link">Remove Photo</button>
                        </div>
                    </div>
                    
                    <div class="lik-profile-counters-row" id="stats-numbers-tray"></div>
                    <div id="profile-bio-container" class="lik-profile-bio-description">Syncing profile parameters...</div>
                </div>

                <div id="partner-status-display-frame" style="width: 100%;"></div>
                
                <div style="display: flex; gap: 12px; width: 100%; margin-bottom: 24px;">
                    <button id="open-edit-modal-btn" class="lik-sidebar-action-pill-btn" style="flex: 1; width: auto; border-radius: 12px; background:#ffffff; color:#000000!important; border:1px solid var(--lik-border-clean);">Edit Profile</button>
                    <button id="open-settings-page-btn" class="lik-sidebar-action-pill-btn" style="flex: 1; width: auto; border-radius: 12px;">Settings</button>
                </div>

                <div class="lik-feed-master-card-shell" style="padding: 20px;">
                    <h4 style="font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--lik-text-gray); letter-spacing: 0.5px; margin-bottom: 14px;">Timeline Photos</h4>
                    <div id="lik-profile-photos-target-matrix" class="lik-profile-photo-matrix"></div>
                </div>

            </div>
        </main>

        <nav class="lik-portable-bottom-bar">
            <a href="index.html">Home</a>
            <a href="upload.html">Create</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html" class="lik-active-route">Account</a>
        </nav>
    </div>

    <div id="edit-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="font-weight:700; margin-bottom: 20px;">Update Profile</h3>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-user-name">Display Name</label>
                    <input type="text" id="edit-user-name" class="lik-search-native-input" required>
                </div>
                <div class="form-group">
                    <label for="edit-user-age">Age</label>
                    <input type="number" id="edit-user-age" class="lik-search-native-input" required min="13">
                </div>
                <div class="form-group">
                    <label for="edit-user-bio">Biography</label>
                    <textarea id="edit-user-bio" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="button" id="close-edit-modal-btn" class="lik-sidebar-action-pill-btn" style="flex: 1; width:auto; border-radius:8px; background:#fff; color:#000!important; border:1px solid var(--lik-border-clean);">Cancel</button>
                    <button type="submit" class="lik-sidebar-action-pill-btn" style="flex: 1; width:auto; border-radius:8px;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Profile</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/style.css?v=2.0.0">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="brand-wrapper" onclick="window.location.href='index.html'">
                <img src="logo.png" alt="LIK Logo">
                <h1>LIK</h1>
            </div>
            <nav class="desktop-nav">
                <a href="index.html">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="swaps.html">Swaps</a>
                <a href="profile.html" class="active">Profile</a>
            </nav>
        </header>
        
        <main>
            <div class="post-card" style="padding: 24px; text-align: center;">
                <div class="avatar-container" style="margin-bottom: 16px; display:inline-block;">
                    <div id="avatar-preview" class="profile-avatar" style="width:90px; height:90px; font-size:2rem; margin:0 auto;">-</div>
                    <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                    <button id="remove-pic-btn" class="remove-pic-btn">Remove Photo</button>
                </div>
                
                <h2 id="lbl-username-display" style="font-size:1.4rem; font-weight:700;">User</h2>
                <div class="stats-row" id="stats-numbers-tray" style="justify-content:center;"></div>
                <p id="profile-bio-container" class="profile-bio-text" style="margin-top:8px; color:var(--text-muted);">Syncing profile bio details...</p>
                
                <div id="partner-status-display-frame" style="width: 100%; margin-top: 16px;"></div>
                
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button id="open-edit-modal-btn" class="btn-secondary" style="flex: 1; display: none;">Edit Profile</button>
                    <button id="open-settings-page-btn" class="btn-primary" style="flex: 1;" onclick="window.location.href='settings.html'">Settings</button>
                </div>
            </div>

            <div class="post-card" style="padding: 20px;">
                <h4 style="font-size:0.85rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.5px; margin-bottom:12px;">Timeline Photos</h4>
                <div id="user-moments"></div>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="swaps.html">Swaps</a>
            <a href="profile.html" class="active">Profile</a>
        </nav>
    </div>

    <div id="edit-profile-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-bottom: 16px; font-weight:700;">Update Profile</h3>
            <form id="edit-profile-form">
                <div class="form-group">
                    <label for="edit-user-name">Display Name</label>
                    <input type="text" id="edit-user-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-user-age">Age</label>
                    <input type="number" id="edit-user-age" required min="13">
                </div>
                <div class="form-group">
                    <label for="edit-user-bio">Biography</label>
                    <textarea id="edit-user-bio" rows="3"></textarea>
                </div>
                <div style="display: flex; gap: 12px; margin-top:24px;">
                    <button type="button" id="close-edit-modal-btn" class="btn-secondary" style="flex: 1;">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 1;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>

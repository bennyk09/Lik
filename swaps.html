<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIK - Swaps Manager</title>
    <link rel="stylesheet" href="css/style.css?v=11.0.7">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 onclick="window.location.href='index.html'">LIK</h1>
            <nav class="desktop-nav">
                <a href="index.html">Wall</a>
                <a href="upload.html">Upload</a>
                <a href="swaps.html" class="active">Swaps</a>
                <a href="profile.html">Profile</a>
            </nav>
        </header>
        
        <main>
            <div style="max-width: 600px; margin: 0 auto; position: relative;">
                
                <div class="search-wrapper" style="margin-bottom: 32px; position: relative;">
                    <div class="form-group" style="margin-bottom: 0; position: relative;">
                        <input type="text" id="swaps-search-input" placeholder="Search profiles by handle... (e.g. benny)" style="padding-left: 38px; height: 42px; background: var(--card-color); border: 1px solid var(--card-border); border-radius: var(--radius-md); color: var(--text-main); width: 100%; font-size: 0.9rem;">
                        <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.6; font-size: 0.85rem;">🔍</span>
                    </div>
                    <div id="swaps-search-results" class="post-card" style="display: none; margin-top: 6px; padding: 6px; margin-bottom: 0; position: absolute; width: 100%; z-index: 2000; border-color: var(--card-border); background: #16161a; box-shadow: 0 12px 32px rgba(0,0,0,0.5);"></div>
                </div>

                <div style="margin-bottom: 32px;">
                    <h4 style="margin: 0 0 16px 4px; font-size:0.8rem; text-transform:uppercase; color:var(--accent-color); letter-spacing:0.5px;">Swap Requests (Incoming)</h4>
                    <div id="incoming-requests-list" style="display: flex; flex-direction: column; gap: 10px;">
                        <p style="color: var(--text-muted); font-size: 0.85rem; padding: 12px 4px;">Checking incoming requests...</p>
                    </div>
                </div>

                <div style="margin-bottom: 32px;">
                    <h4 style="margin: 0 0 16px 4px; font-size:0.8rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.5px;">Pending Invitations (Sent)</h4>
                    <div id="sent-requests-list" style="display: flex; flex-direction: column; gap: 10px;">
                        <p style="color: var(--text-muted); font-size: 0.85rem; padding: 12px 4px;">No active pending sent requests.</p>
                    </div>
                </div>

                <div>
                    <h4 style="margin: 0 0 16px 4px; font-size:0.8rem; text-transform:uppercase; color:var(--text-muted); letter-spacing:0.5px;">Swapped Networks (Mutual Connections)</h4>
                    <div id="mutual-swaps-list" style="display: flex; flex-direction: column; gap: 10px;">
                        <p style="color: var(--text-muted); font-size: 0.85rem; padding: 12px 4px;">No mutual connections formed yet.</p>
                    </div>
                </div>

            </div>
        </main>

        <nav class="bottom-nav">
            <a href="index.html">Wall</a>
            <a href="upload.html">Upload</a>
            <a href="swaps.html" class="active">Swaps</a>
            <a href="profile.html">Profile</a>
        </nav>
    </div>

    <script type="module" src="js/auth-google.js"></script>
    <script type="module" src="js/swaps.js"></script>
</body>
</html>
